<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>
<meta name="apple-mobile-web-app-title" content="Bot PMU"/>
<meta name="theme-color" content="#f4f5f7"/>
<title>Bot PMU · CDCH</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap');
:root {
  --bg:#f4f5f7; --sf:#ffffff; --card:#ffffff; --border:#e2e5ec;
  --gold:#b08524; --goldg:rgba(176,133,36,.10); --goldd:#d9c48a;
  --green:#1a9d52; --greenb:#e8f7ee;
  --orange:#c25e1a; --orangeb:#fbeee2;
  --red:#c83232; --redb:#fbe9e9;
  --blue:#2b7cc4; --blueb:#e7f1fa;
  --text:#1a1d26; --dim:#5a6072; --muted:#9aa0b0;
  --serif:'Cormorant Garamond',serif;
  --sans:'DM Sans',sans-serif;
  --mono:'JetBrains Mono',monospace;
  --st:env(safe-area-inset-top,0px);
  --sb:env(safe-area-inset-bottom,0px);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{background:var(--bg)}
body{color:var(--text);font-family:var(--sans);font-size:15px;min-height:100dvh;-webkit-text-size-adjust:100%;overscroll-behavior:none;padding-bottom:calc(var(--sb)+220px)}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-track{background:var(--sf)}::-webkit-scrollbar-thumb{background:var(--goldd);border-radius:2px}
button{cursor:pointer;font-family:var(--sans);border:none;outline:none;-webkit-tap-highlight-color:transparent;transition:all .15s}
input,select{outline:none;font-family:var(--sans);-webkit-appearance:none}

/* ── BOTTOM TABS ── */
.tabs-bar {
  position:fixed;bottom:0;left:0;right:0;
  background:rgba(255,255,255,.97);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-top:1px solid var(--border);
  box-shadow:0 -2px 12px rgba(0,0,0,.05);
  display:flex;
  padding:10px 0 calc(var(--sb) + 10px);
  z-index:100;
}
.tab-btn {
  flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;
  background:transparent;color:var(--muted);font-size:10px;font-weight:500;padding:2px 0;
}
.tab-btn.on { color:var(--gold); }
.tab-btn .ico { font-size:22px;line-height:1; }

/* ── PAGES ── */
.page { display:none; padding:calc(var(--st)+16px) 16px 16px; }
.page.on { display:block; animation:fadeUp .25s ease; }
@keyframes fadeUp { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }

/* ── HEADER ── */
.hdr {
  display:flex;justify-content:space-between;align-items:flex-end;
  padding-bottom:18px;border-bottom:1px solid var(--border);margin-bottom:20px;
}
.hdr-logo { font-family:var(--serif);font-size:32px;font-weight:700;line-height:1; }
.hdr-logo span { color:var(--gold); }
.hdr-eyebrow { font-family:var(--mono);font-size:9px;color:var(--gold);letter-spacing:4px;text-transform:uppercase;margin-bottom:4px; }

/* ── CALENDRIER ── */
.cal-wrap { background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:14px; }
.cal-nav-row { display:flex;align-items:center;justify-content:space-between;margin-bottom:12px; }
.cal-nav { background:var(--sf);border:1px solid var(--border);color:var(--gold);font-size:20px;padding:6px 14px;border-radius:8px; }
.cal-nav:active { background:var(--card); }
.cal-month { font-family:var(--serif);font-size:20px;font-weight:700; }
.cal-grid { display:grid;grid-template-columns:repeat(7,1fr);gap:4px; }
.cal-dn { text-align:center;font-size:10px;color:var(--muted);padding:4px 0;font-weight:600; }
.cal-d {
  aspect-ratio:1;display:flex;align-items:center;justify-content:center;
  border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;
  border:1px solid var(--border);background:var(--sf);color:var(--text);
  transition:all .12s;
}
.cal-d:active { background:var(--gold);color:#000; }
.cal-d.today { border-color:var(--gold);color:var(--gold); }
.cal-d.sel { background:var(--gold)!important;color:#000!important;font-weight:700;border-color:var(--gold); }
.cal-d.empty { cursor:default;background:transparent;border:none; }

/* ── BUTTONS ── */
.btn {
  width:100%;padding:12px 16px;border-radius:9px;font-weight:600;font-size:14px;
  display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:10px;
}
.btn:active { transform:scale(.98);opacity:.9; }
.btn:disabled { opacity:.4;cursor:not-allowed;transform:none; }
.btn-gold { background:var(--gold);color:#000; }
.btn-green { background:var(--green);color:#000; }
.btn-blue { background:var(--blue);color:#000; }
.btn-ghost { background:transparent;border:1px solid var(--border);color:var(--dim); }
.btn-ghost:active { border-color:var(--gold);color:var(--gold); }
.btn-sm { width:auto;padding:8px 14px;font-size:12px;margin-bottom:0; }

/* ── SECTION TITLE ── */
.stitle { font-family:var(--mono);font-size:9px;color:var(--muted);letter-spacing:3px;text-transform:uppercase;margin:16px 0 10px; }

/* ── CARDS ── */
.card { background:var(--card);border:1px solid var(--border);border-radius:11px;padding:14px;margin-bottom:10px;box-shadow:0 1px 3px rgba(0,0,0,.04); }
.chip { display:inline-flex;align-items:center;padding:2px 8px;border-radius:12px;font-size:11px;font-weight:600; }

/* ── COURSE ROW ── */
.crow {
  display:flex;align-items:center;gap:10px;
  padding:11px 13px;border-radius:9px;margin-bottom:6px;
  background:var(--card);border:1px solid var(--border);
  transition:border-color .15s;
}
.crow.jouable { border-left:3px solid var(--green); }
.crow.jouable.checked { border-color:var(--green);background:rgba(34,181,102,.06); }
.crow.prudence { border-left:3px solid var(--orange); }
.crow.eviter { border-left:3px solid var(--red);opacity:.6; }
.crow.eliminee { border-left:3px solid var(--muted);opacity:.4; }

/* ── CHECKBOX ── */
.cbox {
  width:22px;height:22px;border-radius:6px;border:2px solid var(--border);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
  background:var(--sf);transition:all .15s;cursor:pointer;
}
.cbox.on { background:var(--green);border-color:var(--green); }

/* ── VERDICT MINI ── */
.vmin { border-radius:6px;padding:4px 7px;text-align:center;flex-shrink:0;min-width:60px; }

/* ── CHEVAL ── */
.cheval-card { background:var(--card);border:1px solid var(--border);border-radius:9px;margin-bottom:7px;overflow:hidden; }
.cheval-head { display:flex;align-items:center;gap:10px;padding:10px 13px;cursor:pointer; }
.cheval-num { width:30px;height:30px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-weight:700;font-size:14px;flex-shrink:0; }
.cheval-pts { padding:8px 13px 10px;border-top:1px solid var(--border);background:var(--sf);display:flex;gap:5px;flex-wrap:wrap; }

/* ── PBAR ── */
.pbar { height:4px;background:var(--border);border-radius:2px;overflow:hidden;margin-top:5px; }
.pbar-fill { height:100%;border-radius:2px;transition:width .4s ease; }

/* ── LOG ── */
.logbox { background:var(--sf);border:1px solid var(--border);border-radius:8px;padding:10px 13px;font-family:var(--mono);font-size:11px;color:var(--dim);margin:10px 0;line-height:1.5;min-height:36px; }

/* ── BILAN ── */
.stat2 { display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px; }
.sbox { background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px;text-align:center; }
.sval { font-family:var(--mono);font-size:26px;font-weight:700;line-height:1;margin-bottom:3px; }
.slbl { font-size:11px;color:var(--muted); }
.ssub { font-size:10px;color:var(--muted);margin-top:2px; }

/* ── RESULT CARD ── */
.rcard { background:var(--card);border:1px solid var(--border);border-radius:10px;padding:13px;margin-bottom:9px; }

/* ── TOAST ── */
.toast { position:fixed;bottom:calc(var(--sb)+80px);left:50%;transform:translateX(-50%) translateY(80px);background:var(--green);color:#000;font-weight:600;font-size:13px;padding:10px 20px;border-radius:20px;transition:transform .3s;z-index:999;white-space:nowrap;pointer-events:none; }
.toast.on { transform:translateX(-50%) translateY(0); }

/* ── INPUT ── */
.inp { background:var(--sf);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:10px 12px;font-size:14px;width:100%; }
.inp:focus { border-color:var(--gold); }

@keyframes spin { to{transform:rotate(360deg)} }
.spin { display:inline-block;animation:spin .9s linear infinite; }
.hidden { display:none!important; }
.divider { height:1px;background:var(--border);margin:16px 0; }
</style>
</head>
<body>

<div class="toast" id="toast"></div>

<!-- ══════════════════════════════════════
     ONGLET JEUX
══════════════════════════════════════ -->
<div class="page on" id="page-jeux">

  <!-- Header -->
  <div class="hdr">
    <div>
      <div class="hdr-eyebrow">CDCH · Système Expert</div>
      <div class="hdr-logo">Bot <span>PMU</span></div>
    </div>
    <div style="text-align:right">
      <div style="font-family:var(--serif);font-size:22px;font-weight:700;color:var(--gold)" id="hdr-date">—</div>
      <div style="font-size:10px;color:var(--muted);text-transform:uppercase" id="hdr-day">—</div>
    </div>
  </div>

  <!-- ── ÉTAPE 1 : CALENDRIER ── -->
  <div id="bloc-cal">
    <div class="stitle">Choisir la date</div>
    <div class="cal-wrap">
      <div class="cal-nav-row">
        <button class="cal-nav" onclick="calMove(-1)">‹</button>
        <div class="cal-month" id="cal-label">—</div>
        <button class="cal-nav" onclick="calMove(1)">›</button>
      </div>
      <div class="cal-grid" id="cal-grid"></div>
    </div>
    <button class="btn btn-gold" id="btn-valdate" onclick="validerDate()" style="font-size:16px;padding:15px;margin-top:14px">
      Valider la date →
    </button>
    <div id="cal-hint" style="text-align:center;font-size:12px;color:var(--muted);margin-top:6px">Sélectionnez d'abord une date</div>
  </div>

  <!-- ── ÉTAPE 2 : PROGRAMME + SCAN 1 ── -->
  <div id="bloc-prog" class="hidden">
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap">
      <button class="btn btn-ghost btn-sm" onclick="retourCal()">← Calendrier</button>
      <div style="font-family:var(--serif);font-size:18px;font-weight:700;color:var(--gold)" id="prog-date-label">—</div>
    </div>

    <div class="logbox" id="prog-log">En attente…</div>

    <!-- Programme complet (avant scan) -->
    <div id="prog-list" class="hidden">
      <div class="stitle">Programme de trot du jour</div>
      <div id="prog-courses"></div>
      <button class="btn btn-gold" id="btn-scan1" onclick="lancerScan1()" style="margin-bottom:60px">
        🔍 Scan 1 — Expert N°1 (Filtrer les courses jouables)
      </button>
    </div>
  </div>

  <!-- ── ÉTAPE 3 : RÉSULTATS SCAN 1 + CASES À COCHER ── -->
  <div id="bloc-scan1" class="hidden">
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px">
      <button class="btn btn-ghost btn-sm" onclick="retourProg()">← Programme</button>
      <div style="font-size:13px;color:var(--muted)" id="scan1-summary">—</div>
    </div>

    <div class="stitle">Courses analysées — cochez les courses à analyser</div>
    <div id="scan1-courses"></div>

    <button class="btn btn-green" id="btn-scan2" onclick="lancerScan2()" disabled style="margin-bottom:40px">
      🔬 Scan 2 — Expert N°2 (Analyser les chevaux)
    </button>
  </div>

  <!-- ── ÉTAPE 4 : RÉSULTATS SCAN 2 ── -->
  <div id="bloc-scan2" class="hidden">
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px">
      <button class="btn btn-ghost btn-sm" onclick="retourScan1()">← Courses</button>
      <div style="font-size:13px;color:var(--muted)">Sélection des chevaux</div>
    </div>
    <div class="logbox" id="scan2-log">En attente…</div>
    <div id="scan2-results"></div>
    <div style="height:50px"></div>
  </div>

</div>

<!-- ══════════════════════════════════════
     ONGLET BILAN
══════════════════════════════════════ -->
<div class="page" id="page-bilan">
  <div style="padding-top:calc(var(--st)+16px)">
    <div class="hdr-eyebrow" style="margin-bottom:6px">Performance & Statistiques</div>
    <div class="hdr-logo" style="margin-bottom:20px">Bilan <span>CDCH</span></div>
    <div id="bilan-content"></div>
  </div>
</div>

<!-- ══════════════════════════════════════
     BARRE D'ONGLETS
══════════════════════════════════════ -->
<nav class="tabs-bar">
  <button class="tab-btn on" onclick="goPage('jeux')" id="nav-jeux">
    <span class="ico">🎯</span>Jeux
  </button>
  <button class="tab-btn" onclick="goPage('bilan')" id="nav-bilan">
    <span class="ico">📊</span>Bilan
  </button>
</nav>

<script>
'use strict';

// ══════════════════════════════════════════════════════
//  CONFIG & CONSTANTES
// ══════════════════════════════════════════════════════
const BASE = window.location.origin;
const MONTHS = ['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
const MONTHS_S = ['Jan','Fév','Mar','Avr','Mai','Jun','Jul','Aoû','Sep','Oct','Nov','Déc'];
const DAYS = ['Dim','Lun','Mar','Mer','Jeu','Ven','Sam'];

// ══════════════════════════════════════════════════════
//  ÉTAT GLOBAL
// ══════════════════════════════════════════════════════
const S = {
  selDate: null,        // Date JS sélectionnée
  calY: new Date().getFullYear(),
  calM: new Date().getMonth(),
  allCourses: [],       // Toutes les courses de trot
  scoredCourses: [],    // Courses scorées par E1
  checkedIds: new Set(),// IDs des courses cochées
  e2Results: [],        // Résultats E2 par course
};

// ══════════════════════════════════════════════════════
//  STORAGE
// ══════════════════════════════════════════════════════
const DB = 'botpmu_v5';
const dbGet = () => { try { return JSON.parse(localStorage.getItem(DB)||'{"analyses":[]}'); } catch { return {analyses:[]}; } };
const dbSet = d => { try { localStorage.setItem(DB, JSON.stringify(d)); } catch {} };
const dbAdd = entry => { const d=dbGet(); d.analyses.unshift(entry); if(d.analyses.length>200) d.analyses.pop(); dbSet(d); };
const dbUpd = (id,upd) => { const d=dbGet(); const i=d.analyses.findIndex(a=>a.id===id); if(i>=0) d.analyses[i]={...d.analyses[i],...upd}; dbSet(d); };

// ══════════════════════════════════════════════════════
//  NAVIGATION
// ══════════════════════════════════════════════════════
function goPage(name) {
  ['jeux','bilan'].forEach(n => {
    document.getElementById('page-'+n).classList.toggle('on', n===name);
    document.getElementById('nav-'+n).classList.toggle('on', n===name);
  });
  window.scrollTo({top:0});
  if (name==='bilan') renderBilan();
}

function showBloc(name) {
  ['cal','prog','scan1','scan2'].forEach(b => {
    document.getElementById('bloc-'+b).classList.toggle('hidden', b!==name);
  });
  window.scrollTo({top:0});
}

function retourCal()   { showBloc('cal'); }
function retourProg()  { showBloc('prog'); }
function retourScan1() { showBloc('scan1'); }

// ══════════════════════════════════════════════════════
//  CALENDRIER
// ══════════════════════════════════════════════════════
function renderCal() {
  const {calY,calM} = S;
  document.getElementById('cal-label').textContent = `${MONTHS[calM]} ${calY}`;
  const today = new Date(); today.setHours(0,0,0,0);
  const first = new Date(calY,calM,1);
  const last  = new Date(calY,calM+1,0);
  const dow   = (first.getDay()+6)%7; // Lundi=0

  let h = ['L','M','M','J','V','S','D'].map(d=>`<div class="cal-dn">${d}</div>`).join('');
  for(let i=0;i<dow;i++) h+='<div class="cal-d empty"></div>';

  for(let d=1;d<=last.getDate();d++){
    const dt = new Date(calY,calM,d);
    const isToday = dt.getTime()===today.getTime();
    const isSel   = S.selDate && dt.getTime()===S.selDate.getTime();
    const cls = [isToday?'today':'', isSel?'sel':''].filter(Boolean).join(' ');
    h += `<div class="cal-d ${cls}" onclick="selDate(${calY},${calM},${d})">${d}</div>`;
  }
  document.getElementById('cal-grid').innerHTML = h;
}

function calMove(dir) {
  S.calM += dir;
  if(S.calM<0){S.calM=11;S.calY--;}
  if(S.calM>11){S.calM=0;S.calY++;}
  renderCal();
}

function selDate(y,m,d) {
  S.selDate = new Date(y,m,d);
  renderCal();
  const hint = document.getElementById('cal-hint');
  if(hint) hint.innerHTML = `✅ Date sélectionnée : <b style="color:var(--gold)">${String(d).padStart(2,'0')}/${String(m+1).padStart(2,'0')}/${y}</b>`;
}

function fmtPMU(dt) {
  return String(dt.getDate()).padStart(2,'0')+String(dt.getMonth()+1).padStart(2,'0')+dt.getFullYear();
}
function fmtFR(dt) {
  return String(dt.getDate()).padStart(2,'0')+'/'+String(dt.getMonth()+1).padStart(2,'0')+'/'+dt.getFullYear();
}

// ══════════════════════════════════════════════════════
//  ÉTAPE 2 — Charger le programme
// ══════════════════════════════════════════════════════
async function validerDate() {
  if(!S.selDate) return;
  const d = S.selDate;
  const label = fmtFR(d);

  // Update header
  document.getElementById('hdr-date').textContent = d.getDate()+' '+MONTHS_S[d.getMonth()];
  document.getElementById('hdr-day').textContent = DAYS[d.getDay()];
  document.getElementById('prog-date-label').textContent = label;

  showBloc('prog');
  setLog('prog','🌐 Récupération du programme PMU du '+label+'…','dim');
  document.getElementById('prog-list').classList.add('hidden');

  try {
    const res = await fetch(`${BASE}/api/programme?date=${fmtPMU(d)}`);
    if(!res.ok) throw new Error('HTTP '+res.status);
    const json = await res.json();
    if(json.error) throw new Error(json.error);

    const reunions = json?.programme?.reunions || [];
    if(!reunions.length) throw new Error('Aucune réunion trouvée pour cette date.');

    // Extraire toutes les courses de trot
    S.allCourses = [];
    for(const r of reunions){
      const hippo = r.hippodrome?.libelleLong || r.hippodrome?.libelleCourt || '';
      const rNum  = r.numOfficiel || r.numReunion || '?';
      for(const c of (r.courses||[])){
        const disc = (c.discipline||c.specialite||'').toUpperCase();
        // Trot ATTELÉ uniquement — on exclut le monté et les autres disciplines
        if(!disc.includes('ATTELE')) continue;
        const cond  = c.categorieParticularite||c.conditions||'';
        const heure = c.heureDepart?String(c.heureDepart).replace(/(\d{2})(\d{2})$/,'$1h$2'):'';
        const part  = c.nombreDeclaresPartants||c.nombrePartants;
        const isQ   = (c.libelle||'').toLowerCase().includes('quinté')||(c.categorieStatut||'').includes('QUINTE');
        S.allCourses.push({
          id:`R${rNum}C${c.numOrdre}`,
          reunion:String(rNum), courseNum:String(c.numOrdre),
          hippodrome:hippo,
          nom:c.libelle||c.libelleCourt||'',
          discipline:'Attelé',
          distance:c.distance, partants:part,
          allocation:c.montantPrix||c.montantTotalOffert||c.montantAlloue||c.montant||null,
          conditions:cond, heure, isQuinte:isQ,
        });
      }
    }

    if(!S.allCourses.length) throw new Error('Aucune course de trot trouvée.');
    setLog('prog',`✅ ${S.allCourses.length} course(s) de trot trouvées`,'green');
    renderProgramme();
    document.getElementById('prog-list').classList.remove('hidden');

  } catch(e) {
    setLog('prog','❌ '+e.message,'red');
  }
}

function renderProgramme() {
  const scC = v => !v||isNaN(v)?'var(--muted)':v>=4?'var(--green)':v>=3?'var(--gold)':v>=2?'var(--orange)':'var(--red)';
  let h = '';
  // Grouper par réunion
  const byR = {};
  S.allCourses.forEach(c => {
    if(!byR[c.reunion]) byR[c.reunion]=[];
    byR[c.reunion].push(c);
  });
  for(const [r, courses] of Object.entries(byR)){
    const hippo = courses[0].hippodrome;
    h += `<div style="margin-bottom:14px">
      <div style="font-family:var(--serif);font-size:14px;font-weight:700;color:var(--gold);margin-bottom:6px">R${r} — ${hippo}</div>`;
    for(const c of courses){
      h += `<div class="crow">
        <div style="flex:1">
          <div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap;margin-bottom:2px">
            <span style="font-family:var(--mono);font-size:11px;color:var(--muted)">${c.id}</span>
            ${c.heure?`<span style="font-size:12px;color:var(--muted)">${c.heure}</span>`:''}
            ${c.isQuinte?`<span class="chip" style="background:rgba(201,165,74,.15);color:var(--gold)">Quinté+</span>`:''}
          </div>
          <div style="font-size:13px;font-weight:600">${c.nom||'—'}</div>
          <div style="font-size:11px;color:var(--muted);margin-top:2px">${c.discipline} · ${c.distance||'?'}m · ${c.partants||'?'} partants${c.allocation?' · '+(c.allocation/1000).toFixed(0)+'k€':''}</div>
        </div>
        <span style="font-size:11px;color:var(--muted)">→</span>

}

//  EXPERT N°1 — SCORING
// ══════════════════════════════════════════════════════
const HIPPO_SC = {VINCENNES:4,'PARIS VINCENNES':4,ENGHIEN:3,CABOURG:2,VICHY:2,'CAGNES SUR MER':2,CAGNES:2};
const sh = h => { const u=(h||'').toUpperCase().replace(/-/g,' '); for(const[k,v] of Object.entries(HIPPO_SC)) if(u.includes(k)) return v; return 0; };
const sd = d => { if(!d) return null; const n=parseInt(d); return isNaN(n)?null:n<=2100?2:n<=2900?3:4; };
const sp = n => { if(!n) return null; const v=parseInt(n); return isNaN(v)?null:v>=18?'ELIM':v<=16?4:2; };
const sg = c => { const s=(c||'').toLowerCase(); return /\d+\s*(à|a)\s*\d+\s*ans/.test(s)?4:/pour\s+\d+\s*ans/.test(s)&&!s.includes(' et ')?1:4; };
const spot = c => { const s=(c||'').toLowerCase(); return s.includes('autostart')||s.includes('auto-start')?3:s.includes('volté')||s.includes('2 poteaux')?1:3; };
const isExclu = c => ['apprenti','lads','amateur','gentlemen','gentleman','ladies'].some(k=>(c||'').toLowerCase().includes(k));

function scoreE1(c) {
  if(isExclu(c.conditions)) return {verdict:'ÉLIMINÉE',reason:'Apprentis/amateurs',total:0,scores:null};
  const np = parseInt(c.partants)||0;
  if(np > 0 && np < 8) return {verdict:'ÉLIMINÉE',reason:`${np} partants (<8 — les 3 places ne paient pas)`,total:0,scores:null};
  const p=sp(c.partants);
  if(p==='ELIM') return {verdict:'ÉLIMINÉE',reason:`${c.partants} partants ≥18`,total:0,scores:null};
  const h=sh(c.hippodrome), d=sd(c.distance), g=sg(c.conditions), t=spot(c.conditions);
  const scores={H:h,D:d,P:p,G:g,Pot:t};
  const total=[h,d,p,g,t].filter(v=>typeof v==='number').reduce((a,b)=>a+b,0);
  if(total>16)  return {verdict:'JOUABLE',  total,scores};
  if(total>=14) return {verdict:'PRUDENCE',  total,scores};
  return             {verdict:'À ÉVITER', total,scores};
}

// ══════════════════════════════════════════════════════
//  EXPERT N°2 — SCORING
// ══════════════════════════════════════════════════════
const TOP_DRV = ['raffin','rochard','lebourgeois','nivard','abrivard','mottier','ploquin'];
const TOP_CUM = ['bazire','duvaldestin','abrivard','guarato','briand'];
const NUM_STARS=[4,5,6], NUM_ELIM=[1,2,10,11,17,18], MOIS_HIV=[10,11,12,1,2,3];

const calcVM = courses => {
  if(!courses||!courses.length) return null;
  const c3=courses.slice(0,3);
  const idx=c3.map(c=>{const p=(c.place||'').toString().toUpperCase();const pn=isNaN(parseInt(p))||['D','A','T'].includes(p)||parseInt(p)>10?10:parseInt(p);return c.alloc>0?(100000/c.alloc)*pn:10;});
  const total=idx.reduce((a,b)=>a+b,0);
  return {indices:idx,total,indice:parseFloat((total/c3.length).toFixed(2))};
};

function scoreE2(p, course) {
  const pts=[];
  const mois=new Date().getMonth()+1;
  const num=parseInt(p.numPmu||p.numero)||0;
  const driver=(p.driver||p.nomJockey||'').toLowerCase();
  const entr=(p.entraineur||p.nomEntraineur||'').toLowerCase();
  const musique=p.musique||'';
  const gains=parseFloat(p.gainsParticipant?.gainsCarriere||0);
  const gainsAnnee=parseFloat(p.gainsParticipant?.gainsAnneeEnCours||0);
  const gainsAnneePrec=parseFloat(p.gainsParticipant?.gainsAnneePrecedente||0);
  const allocJ=parseFloat(course.allocation)||0;
  const nbCourses=parseInt(p.nombreCourses)||0;
  const nbVict=parseInt(p.nombreVictoires)||0;
  const nbPlaces=parseInt(p.nombrePlaces)||0;
  const deferre=(p.deferre||'').toUpperCase();
  const favori=p.dernierRapportReference?.favoris||p.dernierRapportDirect?.favoris||false;
  const cote=parseFloat(p.dernierRapportReference?.rapport||p.dernierRapportDirect?.rapport||99);
  const avis=(p.avisEntraineur||'').toUpperCase();
  const driverChange=p.driverChange;
  const rk=parseInt(p.reductionKilometrique)||0; // ex: 71700 = 1'11"7

  // 1. Numéro autostart (José Coves)
  if(NUM_STARS.includes(num)) pts.push({l:`N°${num} favori autostart (4,5,6)`,p:1});
  else if(NUM_ELIM.includes(num)) pts.push({l:`N°${num} défavorable`,p:-1});

  // 2. Musique régulière (commence par 1, sans D récent)
  if(musique){
    const clean=musique.replace(/\(\d+\)/g,''); // retire les (25)
    const f=clean.trim()[0];
    const debutSansD=!clean.slice(0,6).toUpperCase().includes('D');
    if(f==='1'&&debutSansD) pts.push({l:'Musique régulière (1er récent, sans D)',p:1});
  }

  // 3. Driver attitré (pas de changement de driver)
  if(driverChange===false && driver) pts.push({l:'Driver attitré (inchangé)',p:1});

  // 4. Driver top LeTrot
  if(TOP_DRV.some(d=>driver.includes(d))) pts.push({l:`Driver top LeTrot (${p.driver})`,p:1});

  // 5. Cumulard top 6 (entraîneur = driver)
  const isCum=TOP_CUM.some(c=>driver.includes(c)||entr.includes(c));
  const dEq=driver&&entr&&(driver.split(/[\s.]+/).some(w=>w.length>3&&entr.includes(w))||entr.split(/[\s.]+/).some(w=>w.length>3&&driver.includes(w)));
  if(isCum&&dEq) pts.push({l:'Cumulard top 6 (entr=driver)',p:1});

  // 6. Déferré 4 pattes (D4)
  if(deferre.includes('ANTERIEURS_POSTERIEURS')) pts.push({l:'Déferré 4 pattes (gain vitesse)',p:1});

  // 7. Régularité (taux de places élevé)
  if(nbCourses>=5){
    const tauxPlace=(nbVict+nbPlaces)/nbCourses;
    if(tauxPlace>=0.5) pts.push({l:`Régulier (${Math.round(tauxPlace*100)}% places)`,p:1});
  }

  // 8. Cheval en forme cette saison (gains année > 0 et progression)
  if(gainsAnnee>0 && gainsAnneePrec>0){
    if(gainsAnnee >= gainsAnneePrec*0.5) pts.push({l:'En forme cette saison',p:1});
  }

  // 9. Favori du marché
  if(favori) pts.push({l:`Favori du marché (${cote}€)`,p:1});

  // 10. Avis entraîneur positif
  if(avis==='POSITIF') pts.push({l:'Avis entraîneur POSITIF',p:1});
  else if(avis==='NEGATIF') pts.push({l:'Avis entraîneur négatif',p:-1});

  // 11. Bon chrono / réduction kilométrique (sous 1'13" = 73000)
  if(rk>0 && rk<=130000){
    const sec=Math.floor(rk/1000);
    const dixiemes=Math.round((rk%1000)/100);
    if(rk<=113000) pts.push({l:`Excellent chrono (1'${String(sec-60).padStart(2,'0')}"${dixiemes})`,p:1});
  }

  // 12. Vraie Musique top 3 (José Coves)
  if(p.vmRank&&p.vmRank<=3) pts.push({l:`Vraie Musique top 3 (indice ${p.vmIndice})`,p:1});

  // 13. Tangent au plafond (gains proches allocation)
  if(gains>0&&allocJ>0){const diff=(allocJ-gains)/allocJ;if(diff>=0&&diff<=0.05)pts.push({l:'Tangent au plafond',p:1});}

  // 14. Cheval expérimenté avec victoires
  if(nbCourses>=10 && nbVict>=3){const tauxV=nbVict/nbCourses;if(tauxV>=0.15)pts.push({l:`Bon ratio victoires (${Math.round(tauxV*100)}%)`,p:1});}

  // 15. Cheval déclassé (allocation précédente > allocation du jour de ≥10%)
  let allocPrec=parseFloat(p.allocPrec)||0;
  let allocJour=allocJ;
  // Normalisation : si l'un est en centimes (×100), on aligne les unités
  if(allocJour>0 && allocPrec>0){
    const ratio = allocJour/allocPrec;
    if(ratio>50) allocJour = allocJour/100;
    else if(ratio<0.02) allocPrec = allocPrec/100;
  }
  if(allocPrec>0 && allocJour>0){
    const diffPct=((allocPrec-allocJour)/allocPrec)*100;
    if(diffPct>=10) pts.push({l:`Déclassé (-${Math.round(diffPct)}% vs précédente)`,p:1});
  }

  // 16. Changement de catégorie favorable
  if(allocPrec>0 && allocJour>0){
    const ecart=Math.abs(allocPrec-allocJour)/Math.max(allocPrec,allocJour)*100;
    if(ecart>=10){
      const descend = allocPrec>allocJour;
      if(descend) pts.push({l:'Descend de catégorie (≥10%)',p:1});
    }
  }

  // 17. Domine la hiérarchie directe/indirecte
  if(p.domHierarchie && p.nbConfront>0){
    pts.push({l:`Domine la hiérarchie (${p.nbConfront} confrontations)`,p:1});
  }

  return {pts,total:Math.max(0,pts.filter(x=>x.p>0).length-pts.filter(x=>x.p<0).length)};
}

// ══════════════════════════════════════════════════════
//  ÉTAPE 4 — SCAN 2
// ══════════════════════════════════════════════════════
async function lancerScan2() {
  const selected = S.scoredCourses.filter(c=>S.checkedIds.has(c.id));
  if(!selected.length) return;

  showBloc('scan2');
  document.getElementById('scan2-results').innerHTML='';
  setLog('scan2',`🌐 Récupération des partants pour ${selected.length} course(s)…`,'dim');
  S.e2Results = [];

  const dateFmt = fmtPMU(S.selDate);
  const dateFR  = fmtFR(S.selDate);

  for(const course of selected){
    setLog('scan2',`⚙️ ${course.id} — ${course.nom||course.hippodrome}…`,'dim');
    try {
      const res = await fetch(`${BASE}/api/partants?date=${dateFmt}&reunion=${course.reunion}&course=${course.courseNum}`);
      if(!res.ok) throw new Error('HTTP '+res.status);
      const json = await res.json();
      if(json.error) throw new Error(json.error);

      const participants = json.participants||json.partants||[];
      if(!participants.length) throw new Error('Aucun partant trouvé');

      // Récupération des performances détaillées (allocations passées)
      let perfMap = {};
      try {
        const perfRes = await fetch(`${BASE}/api/performances?date=${dateFmt}&reunion=${course.reunion}&course=${course.courseNum}`);
        if(perfRes.ok){
          const perfJson = await perfRes.json();
          (perfJson.participants||[]).forEach(pp=>{
            perfMap[pp.nomCheval||pp.nom] = pp.coursesCourues||[];
          });
        }
      } catch(e) { /* perfs optionnelles */ }

      // VRAIE MUSIQUE exacte (José Coves) — (100000÷allocation)×place sur 3 dernières courses
      const calcVraieMusique = (nom) => {
        const courses = (perfMap[nom]||[]).slice(0,3);
        if(!courses.length) return 999;
        const indices = courses.map(c=>{
          const alloc = parseFloat(c.allocation)||0;
          // place du cheval dans cette course passée
          let place = 10;
          const moi = (c.participants||[]).find(x=> (x.nomCheval||'').toUpperCase()===nom.toUpperCase());
          if(moi?.place?.place){ const pl=parseInt(moi.place.place); place = (isNaN(pl)||pl>10)?10:pl; }
          return alloc>0 ? (100000/alloc)*place : 10;
        });
        return parseFloat((indices.reduce((a,b)=>a+b,0)/indices.length).toFixed(2));
      };

      const vmArr=participants.map(p=>({
        nom:p.nom||'', ind:calcVraieMusique(p.nom||'')
      })).sort((a,b)=>a.ind-b.ind);
      const vmMap={};vmArr.forEach((v,i)=>{vmMap[v.nom]={rank:i+1,indice:v.ind};});

      // ── LIGNES DIRECTES / INDIRECTES ──
      // Construit la place de chaque cheval du jour dans chacune de ses courses passées
      const nomsJour = participants.map(p=>(p.nom||'').toUpperCase());
      // placesParCheval[nom] = [{courseKey, place}]
      const placesParCheval = {};
      participants.forEach(p=>{
        const nom=(p.nom||'').toUpperCase();
        placesParCheval[nom]=[];
        (perfMap[p.nom]||[]).forEach(c=>{
          const key = `${c.date}_${c.hippodrome}`;
          const moi=(c.participants||[]).find(x=>(x.nomCheval||'').toUpperCase()===nom);
          const pl = moi?.place?.place ? parseInt(moi.place.place) : null;
          if(pl && !isNaN(pl)) placesParCheval[nom].push({key, place:pl});
        });
      });
      // Compte les victoires directes (A devant B dans une course commune)
      const domDirect = {}; // nom -> nb de confrontations gagnées
      nomsJour.forEach(n=>domDirect[n]=0);
      for(let i=0;i<nomsJour.length;i++){
        for(let j=i+1;j<nomsJour.length;j++){
          const A=nomsJour[i], B=nomsJour[j];
          let aGagne=0, bGagne=0;
          placesParCheval[A].forEach(ca=>{
            const cb=placesParCheval[B].find(x=>x.key===ca.key);
            if(cb){ if(ca.place<cb.place) aGagne++; else if(cb.place<ca.place) bGagne++; }
          });
          if(aGagne>bGagne) domDirect[A]++;
          else if(bGagne>aGagne) domDirect[B]++;
        }
      }
      // Le(s) cheval(aux) qui domine(nt) le plus de confrontations directes
      const maxDom = Math.max(0,...Object.values(domDirect));

      const scored=participants.map(p=>{
        const nom=p.nom||p.nomCheval||'';
        const vm=vmMap[nom];
        // Allocation de la dernière course (pour déclassé)
        const lastCourse = (perfMap[nom]||[])[0];
        const allocPrec = lastCourse ? parseFloat(lastCourse.allocation)||0 : 0;
        const domHierarchie = maxDom>0 && domDirect[(nom||'').toUpperCase()]===maxDom;
        const pvm={...p,nom,vmRank:vm?.rank,vmIndice:vm?.indice,allocPrec,domHierarchie,nbConfront:domDirect[(nom||'').toUpperCase()]||0};
        const r=scoreE2(pvm,course);
        return {...pvm,...r};
      }).sort((a,b)=>b.total-a.total);

      S.e2Results.push({course,scored});

      // Sauvegarde
      dbAdd({
        id:Date.now()+Math.random(),
        date:dateFR,
        course:course.nom||course.hippodrome,
        hippodrome:course.hippodrome,
        heure:course.heure,
        isQuinte:course.isQuinte,
        top3:scored.slice(0,3).map(p=>({numero:p.numero||p.numPmu,nom:p.nom,score:p.total,cote:parseFloat(p.dernierRapportReference?.rapport||0)||null})),
        // Critères de tous les partants (pour analyse d'importance)
        chevaux:scored.map(p=>({
          numero:p.numero||p.numPmu,
          criteres:p.pts.filter(x=>x.p>0).map(x=>x.l.split(' (')[0]) // label sans parenthèses
        })),
        arrivee:null,
        statut:'en_attente',
      });

    } catch(e) {
      S.e2Results.push({course,error:e.message});
    }
  }

  setLog('scan2',`✅ ${S.e2Results.filter(r=>!r.error).length} course(s) analysées`,'green');
  renderScan2Results();
}

        h+=`<div style="background:${cols[i]}10;border:1px solid ${cols[i]}40;border-radius:10px;padding:11px 8px;text-align:center">
          <div style="font-size:20px;margin-bottom:4px">${medals[i]}</div>
          <div style="width:28px;height:28px;border-radius:6px;background:${cols[i]}25;color:${cols[i]};display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-weight:700;font-size:14px;margin:0 auto 5px">${num}</div>
          <div style="font-weight:700;font-size:11px;line-height:1.2;margin-bottom:2px">${p.nom||'—'}</div>
          <div style="font-size:10px;color:var(--muted);margin-bottom:4px">${p.driver||p.nomJockey||''}</div>
          <div style="font-family:var(--mono);font-weight:700;font-size:16px;color:${cols[i]}">${p.total}</div>
          <div style="font-size:9px;color:var(--muted)">pts</div>
        </div>`;
      });
      h+=`</div>`;

      // Tous partants
      scored.forEach((p,i)=>{
        const col=i<3?cols[i]:'var(--muted)';
        const num=p.numero||p.numPmu||'?';
        const pos=p.pts.filter(x=>x.p>0), neg=p.pts.filter(x=>x.p<0), dbg=p.pts.filter(x=>x.p===0);
        h+=`<div class="cheval-card">
          <div class="cheval-head" onclick="this.nextElementSibling.classList.toggle('hidden')">
            <div class="cheval-num" style="background:${col}20;color:${col}">${num}</div>
            <div style="flex:1">
              <div style="font-weight:700;font-size:13px">${p.nom||'—'}</div>
              <div style="font-size:10px;color:var(--muted)">${p.driver||p.nomJockey||''}${p.entraineur?' · '+p.entraineur:''}</div>
              <div class="pbar"><div class="pbar-fill" style="width:${Math.min(100,(p.total/8)*100)}%;background:${col}"></div></div>
            </div>
            <div style="font-family:var(--mono);font-weight:700;font-size:16px;color:${col};flex-shrink:0">${p.total}<span style="font-size:9px;color:var(--muted)">pts</span></div>
            <span style="color:var(--muted);font-size:11px;margin-left:4px">▼</span>
          </div>
          <div class="cheval-pts hidden">
            ${dbg.map(x=>`<span class="chip" style="background:rgba(43,124,196,.12);color:var(--blue);font-size:10px">${x.l}</span>`).join('')}
            ${pos.map(x=>`<span class="chip" style="background:rgba(34,181,102,.12);color:var(--green);font-size:10px">✓ ${x.l}</span>`).join('')}
            ${neg.map(x=>`<span class="chip" style="background:rgba(192,56,56,.12);color:var(--red);font-size:10px">✗ ${x.l}</span>`).join('')}
            ${!pos.length&&!neg.length?`<span style="font-size:11px;color:var(--muted)">Données insuffisantes</span>`:''}
          </div>
        </div>`;
      });

      // Recommandations jeux
      if(scored.length>=2){
        const [t1,t2,t3]=scored;
        const n1=t1.numero||t1.numPmu, n2=t2.numero||t2.numPmu, n3=t3?.numero||t3?.numPmu;
        const isQ=course.isQuinte;
        h+=`<div style="background:var(--card);border:1px solid rgba(201,165,74,.25);border-radius:9px;padding:13px;margin-top:6px">
          <div style="font-family:var(--serif);font-size:15px;color:var(--gold);margin-bottom:8px">Jeux recommandés CDCH</div>
          ${[
            ['Simple Gagnant',`#${n1} ${t1.nom}`,isQ?'LT: 32,29%':'','var(--green)'],
            ['Simple Placé',`#${n1} ${t1.nom}`,isQ?'LT: 57,35%':'','var(--green)'],
            ['Couplé Gagnant',`#${n1}+#${n2}`,isQ?'LT: 12,13%':'','var(--gold)'],
            ['Couplé Placé',`#${n1}+#${n2}`,isQ?'LT: 23,70%':'','var(--gold)'],
            t3?['2SUR4',`#${n1}+#${n2}+#${n3}`,isQ?'LT: 32,43%':'','var(--orange)']:null,
          ].filter(Boolean).map(([l,d,s,c])=>`
            <div style="display:flex;justify-content:space-between;align-items:center;background:var(--sf);border-radius:7px;padding:7px 10px;margin-bottom:5px">
              <div><div style="font-weight:600;font-size:11px;color:${c}">${l}</div><div style="font-size:11px;color:var(--dim);margin-top:1px">${d}</div></div>
              ${s?`<span style="font-size:10px;color:var(--muted)">${s}</span>`:''}
            </div>`).join('')}
        </div>`;
      }
    }
    h+='</div>';
  }

  document.getElementById('scan2-results').innerHTML=h;
}

// ══════════════════════════════════════════════════════
//  BACKTEST AUTOMATIQUE
// ══════════════════════════════════════════════════════
async function lancerBacktest() {
  const fromStr = document.getElementById('bt-from').value;
  const toStr = document.getElementById('bt-to').value;
  if(!fromStr||!toStr){toast('Choisissez les dates');return;}

  const from = new Date(fromStr), to = new Date(toStr);
  if(from>to){toast('Date début après date fin');return;}

  const nbDays = Math.round((to-from)/(1000*60*60*24))+1;
  if(nbDays>40){toast('Maximum 40 jours par backtest');return;}

  const btn = document.getElementById('bt-btn');
  const prog = document.getElementById('bt-progress');
  const bar = document.getElementById('bt-bar');
  const status = document.getElementById('bt-status');
  btn.disabled = true;
  prog.style.display = 'block';

  const db = dbGet();
  let traités=0, ajoutés=0, jour=0;

  for(let d=new Date(from); d<=to; d.setDate(d.getDate()+1)){
    jour++;
    const dateFmt = String(d.getDate()).padStart(2,'0')+String(d.getMonth()+1).padStart(2,'0')+d.getFullYear();
    const dateFR = String(d.getDate()).padStart(2,'0')+'/'+String(d.getMonth()+1).padStart(2,'0')+'/'+d.getFullYear();
    status.textContent = `Jour ${jour}/${nbDays} — ${dateFR}…`;
    bar.style.width = Math.round((jour/nbDays)*100)+'%';

    try {
      const res = await fetch(`${BASE}/api/arrivees?date=${dateFmt}`);
      if(!res.ok) continue;
      const json = await res.json();
      const courses = json.courses||[];

      for(const c of courses){
        traités++;
        // Applique Expert 1
        const e1 = scoreE1({
          hippodrome:c.hippodrome, distance:c.distance,
          partants:c.partants, conditions:c.conditions
        });
        if(e1.verdict!=='JOUABLE') continue; // on ne garde que les jouables

        // Applique Expert 2 sur les partants
        const parseMus = mus => {
          if(!mus) return 10;
          const clean=mus.replace(/\(\d+\)/g,'');
          const m=clean.match(/(\d+|D|A|T|R)[ammphco]/gi)||[];
          const places=m.slice(0,3).map(x=>{const ch=x.slice(0,-1).toUpperCase();return isNaN(parseInt(ch))||['D','A','T','R'].includes(ch)||parseInt(ch)>10?10:parseInt(ch);});
          return places.length?places.reduce((a,b)=>a+b,0)/places.length:10;
        };
        const vmArr=c.participants.map(p=>({nom:p.nom,ind:parseMus(p.musique)})).sort((a,b)=>a.ind-b.ind);
        const vmMap={};vmArr.forEach((v,i)=>{vmMap[v.nom]={rank:i+1,indice:v.ind.toFixed(1)};});

        const scored=c.participants.map(p=>{
          const vm=vmMap[p.nom];
          const pvm={...p,vmRank:vm?.rank,vmIndice:vm?.indice};
          const r=scoreE2(pvm,c);
          return {...pvm,...r};
        }).sort((a,b)=>b.total-a.total);

        const top3 = scored.slice(0,3).map(p=>({
          numero:p.numPmu, nom:p.nom, score:p.total,
          cote: parseFloat(p.dernierRapportReference?.rapport || p.dernierRapportDirect?.rapport || 0) || null
        }));

        // Évite les doublons
        const exists = db.analyses.find(a=>a.date===dateFR && a.courseId===c.id);
        if(exists) continue;

        db.analyses.unshift({
          id:Date.now()+Math.random(),
          date:dateFR,
          courseId:c.id,
          course:c.nom||c.hippodrome,
          hippodrome:c.hippodrome,
          isQuinte:c.isQuinte,
          top3,
          chevaux:scored.map(p=>({
            numero:p.numPmu,
            criteres:p.pts.filter(x=>x.p>0).map(x=>x.l.split(' (')[0])
          })),
          arrivee:c.arrivee.join('-'),
          statut:'complete',
          backtest:true,
        });
        ajoutés++;
      }
    } catch(e) { /* skip */ }
  }

  if(db.analyses.length>2000) db.analyses=db.analyses.slice(0,2000);
  dbSet(db);

  status.textContent = `✅ Terminé — ${ajoutés} courses jouables ajoutées (${traités} analysées)`;
  bar.style.width='100%';
  btn.disabled=false;
  toast(`✅ ${ajoutés} courses ajoutées au bilan`);
  setTimeout(()=>renderBilan(), 1500);
}

function renderBilan() {
  const db = dbGet();
  const all = db.analyses||[];
  const done = all.filter(a=>a.statut==='complete');
  const wait = all.filter(a=>a.statut==='en_attente');
  const el = document.getElementById('bilan-content');

  // Calculer stats
  const stats = {
    // Simple Gagnant par cheval
    sg1:0, sg2:0, sg3:0,
    // Simple Placé par cheval
    sp1:0, sp2:0, sp3:0,
    // Couplé Placé par combinaison
    cp12:0, cp13:0, cp23:0,
    // 2SUR4 par combinaison
    s4_12:0, s4_13:0, s4_23:0,
    total:done.length
  };
  const ecartsG=[];
  // ROI Simple Gagnant sur cheval n°1 (mise 1€ par course)
  let cotesN1=[], cotesGagnantes=[], gainTotal=0, miseTotal=0;

  done.forEach(a=>{
    const arr=(a.arrivee||'').split('-').map(n=>parseInt(n)).filter(n=>!isNaN(n));
    const top=(a.top3||[]).map(p=>p.numero);
    if(!arr.length||top.length<1) return;
    const c1=top[0], c2=top[1], c3=top[2];
    const arr3=arr.slice(0,3), arr4=arr.slice(0,4);
    const cote1=(a.top3||[])[0]?.cote||null;

    // Simple Gagnant (cheval arrive 1er)
    const gagne1 = c1===arr[0];
    if(gagne1) stats.sg1++;
    if(c2&&c2===arr[0]) stats.sg2++;
    if(c3&&c3===arr[0]) stats.sg3++;

    // ROI sur cheval n°1
    if(cote1&&cote1>0){
      cotesN1.push(cote1);
      miseTotal+=1;
      if(gagne1){ gainTotal+=cote1; cotesGagnantes.push(cote1); }
    }

    // Simple Placé (cheval dans top 3)
    if(c1&&arr3.includes(c1)) stats.sp1++;
    if(c2&&arr3.includes(c2)) stats.sp2++;
    if(c3&&arr3.includes(c3)) stats.sp3++;

    // Couplé Placé (2 chevaux dans top 3)
    if(c1&&c2&&arr3.includes(c1)&&arr3.includes(c2)) stats.cp12++;
    if(c1&&c3&&arr3.includes(c1)&&arr3.includes(c3)) stats.cp13++;
    if(c2&&c3&&arr3.includes(c2)&&arr3.includes(c3)) stats.cp23++;

    // 2SUR4 (2 chevaux dans top 4)
    if(c1&&c2&&arr4.includes(c1)&&arr4.includes(c2)) stats.s4_12++;
    if(c1&&c3&&arr4.includes(c1)&&arr4.includes(c3)) stats.s4_13++;
    if(c2&&c3&&arr4.includes(c2)&&arr4.includes(c3)) stats.s4_23++;

    // Écart du cheval n°1
    const pos=arr.indexOf(c1)+1;
    if(pos>0) ecartsG.push(pos);
  });

  const pct=(n,t)=>t>0?Math.round((n/t)*100):0;
  const col=v=>v>=50?'var(--green)':v>=30?'var(--gold)':v>=15?'var(--orange)':'var(--red)';
  const ecartStats=arr=>arr.length?{min:Math.min(...arr),max:Math.max(...arr),moy:parseFloat((arr.reduce((a,b)=>a+b,0)/arr.length).toFixed(1))}:{min:'-',max:'-',moy:'-'};
  const esG=ecartStats(ecartsG);
  // Calculs ROI / cotes
  const coteMoy = cotesN1.length ? (cotesN1.reduce((a,b)=>a+b,0)/cotesN1.length).toFixed(2) : '-';
  const coteMoyGag = cotesGagnantes.length ? (cotesGagnantes.reduce((a,b)=>a+b,0)/cotesGagnantes.length).toFixed(2) : '-';
  const roi = miseTotal>0 ? (((gainTotal-miseTotal)/miseTotal)*100).toFixed(2) : '-';
  const tauxGlobal = pct(stats.sg1, stats.total);

  let h='';

  // ── BLOC BACKTEST (toujours visible en haut) ──
  h += `<div class="card" style="border-color:rgba(58,143,212,.3)">
    <div style="font-weight:600;color:var(--blue);font-size:13px;margin-bottom:8px">🔄 Backtest automatique</div>
    <div style="font-size:12px;color:var(--dim);margin-bottom:10px;line-height:1.5">
      Récupère automatiquement les arrivées réelles et applique la stratégie CDCH sur une période passée.
    </div>
    <div style="display:flex;gap:8px;margin-bottom:8px">
      <div style="flex:1">
        <div style="font-size:10px;color:var(--muted);margin-bottom:4px">Du</div>
        <input class="inp" type="date" id="bt-from" value="2026-01-01" style="font-size:13px"/>
      </div>
      <div style="flex:1">
        <div style="font-size:10px;color:var(--muted);margin-bottom:4px">Au</div>
        <input class="inp" type="date" id="bt-to" value="2026-01-07" style="font-size:13px"/>
      </div>
    </div>
    <button class="btn btn-blue" id="bt-btn" onclick="lancerBacktest()" style="margin-bottom:0">
      🔄 Lancer le backtest
    </button>
    <div id="bt-progress" style="display:none;margin-top:10px">
      <div style="font-size:11px;color:var(--dim);margin-bottom:5px" id="bt-status">—</div>
      <div class="pbar" style="height:8px"><div class="pbar-fill" id="bt-bar" style="width:0%;background:var(--blue)"></div></div>
    </div>
    <div style="font-size:10px;color:var(--muted);margin-top:8px;font-style:italic">⚠️ Conseil : traitez par semaine pour éviter la surcharge (≈30s par semaine)</div>
  </div>`;

  if(!done.length && !wait.length){
    h+='<div style="text-align:center;padding:40px 0;color:var(--muted);font-size:13px">Aucune analyse encore.<br/>Lancez un scan dans l\'onglet 🎯 ou un backtest ci-dessus</div>';
    el.innerHTML=h; return;
  }

  // ── VUE D'ENSEMBLE (style BetMines) ──
  h+=`<div class="card" style="border-color:var(--goldd)">
    <div style="display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border);padding-bottom:10px;margin-bottom:12px">
      <div style="font-family:var(--serif);font-size:19px;font-weight:700;color:var(--gold)">Vue d'ensemble</div>
      <div style="font-size:11px;color:var(--muted)">Cheval n°1 · Simple Gagnant</div>
    </div>
    ${[
      ['Alertes (courses jouables)', stats.total, 'var(--text)'],
      ['Taux de réussite', tauxGlobal+'%', col(tauxGlobal)],
      ['Cote moyenne', coteMoy, 'var(--text)'],
      ['Cote moyenne des gagnantes', coteMoyGag, 'var(--text)'],
      ['ROI', (roi!=='-'?(roi>0?'+':'')+roi+'%':'-'), roi!=='-'&&roi>0?'var(--green)':roi!=='-'&&roi<0?'var(--red)':'var(--text)'],
    ].map(([label,val,color])=>`
      <div style="display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid var(--border)">
        <span style="font-size:14px;color:var(--dim)">${label}</span>
        <span style="font-family:var(--mono);font-size:17px;font-weight:700;color:${color}">${val}</span>
      </div>`).join('')}
    <div style="font-size:10px;color:var(--muted);margin-top:10px;font-style:italic">ROI calculé sur une mise fictive de 1€ en Simple Gagnant sur le cheval n°1, à la cote de référence.</div>
  </div>`;

  // Helper ligne de stat avec 3 colonnes
  const row3 = (titre, vals, refs) => {
    return `<div class="card" style="padding:12px 14px">
      <div style="font-weight:600;font-size:13px;margin-bottom:10px">${titre}</div>
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px">
        ${vals.map((v,i)=>{
          const p=pct(v.n,stats.total);
          return `<div style="text-align:center">
            <div style="font-size:10px;color:var(--muted);margin-bottom:3px">${v.label}</div>
            <div style="font-family:var(--mono);font-size:20px;font-weight:700;color:${col(p)}">${p}%</div>
            <div style="font-size:9px;color:var(--muted)">${v.n}/${stats.total}</div>
            <div style="font-size:9px;color:var(--muted)">LT ${refs[i]}</div>
            <div class="pbar" style="margin-top:4px"><div class="pbar-fill" style="width:${p}%;background:${col(p)}"></div></div>
          </div>`;
        }).join('')}
      </div>
    </div>`;
  };

  h+=`<div class="stitle">Statistiques (${done.length} course${done.length>1?'s':''})</div>`;

  // Simple Gagnant par cheval
  h+=row3('🥇 Simple Gagnant',
    [{label:'Cheval 1',n:stats.sg1},{label:'Cheval 2',n:stats.sg2},{label:'Cheval 3',n:stats.sg3}],
    ['32%','15%','12%']);

  // Simple Placé par cheval
  h+=row3('🎯 Simple Placé',
    [{label:'Cheval 1',n:stats.sp1},{label:'Cheval 2',n:stats.sp2},{label:'Cheval 3',n:stats.sp3}],
    ['57%','45%','35%']);

  // Couplé Placé par combinaison
  h+=row3('🔗 Couplé Placé',
    [{label:'1+2',n:stats.cp12},{label:'1+3',n:stats.cp13},{label:'2+3',n:stats.cp23}],
    ['24%','17%','15%']);

  // 2SUR4 par combinaison
  h+=row3('🎲 2SUR4',
    [{label:'1+2',n:stats.s4_12},{label:'1+3',n:stats.s4_13},{label:'2+3',n:stats.s4_23}],
    ['32%','27%','24%']);

  // Écarts (cheval n°1)
  if(ecartsG.length){
    const esG={min:Math.min(...ecartsG),max:Math.max(...ecartsG),moy:(ecartsG.reduce((a,b)=>a+b,0)/ecartsG.length).toFixed(1)};
    h+=`<div class="stitle">Écarts — position réelle du cheval n°1</div>
    <div class="card" style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;text-align:center">
      <div><div style="font-family:var(--mono);font-size:22px;font-weight:700;color:var(--green)">${esG.min}</div><div style="font-size:11px;color:var(--muted)">Écart min</div></div>
      <div><div style="font-family:var(--mono);font-size:22px;font-weight:700;color:var(--gold)">${esG.moy}</div><div style="font-size:11px;color:var(--muted)">Écart moyen</div></div>
      <div><div style="font-family:var(--mono);font-size:22px;font-weight:700;color:var(--orange)">${esG.max}</div><div style="font-size:11px;color:var(--muted)">Écart max</div></div>
    </div>`;
  }

  // ── ANALYSE DE L'IMPORTANCE DES CRITÈRES ──
  // Pour chaque critère : taux de placement (top 3) des chevaux qui le possèdent
  const critStats = {}; // critère -> {placed, total}
  done.forEach(a=>{
    if(!a.chevaux) return;
    const arr=(a.arrivee||'').split('-').map(n=>parseInt(n)).filter(n=>!isNaN(n));
    const arr3=arr.slice(0,3);
    a.chevaux.forEach(ch=>{
      const estPlace = arr3.includes(ch.numero);
      (ch.criteres||[]).forEach(crit=>{
        if(!critStats[crit]) critStats[crit]={placed:0,total:0};
        critStats[crit].total++;
        if(estPlace) critStats[crit].placed++;
      });
    });
  });

  const critArr = Object.entries(critStats)
    .map(([nom,s])=>({nom, taux:Math.round((s.placed/s.total)*100), n:s.total, placed:s.placed}))
    .filter(c=>c.n>=5) // au moins 5 occurrences pour être significatif
    .sort((a,b)=>b.taux-a.taux);

  if(critArr.length){
    h+=`<div class="stitle">Importance des critères (taux de placement top 3)</div>
    <div class="card">
      <div style="font-size:11px;color:var(--dim);margin-bottom:12px;line-height:1.5">
        Pour chaque critère, % de chevaux qui finissent dans les 3 premiers. Plus le taux est élevé, plus le critère est prédictif.
      </div>
      ${critArr.map(c=>{
        const couleur = c.taux>=40?'var(--green)':c.taux>=28?'var(--gold)':c.taux>=20?'var(--orange)':'var(--red)';
        return `<div style="margin-bottom:11px">
          <div style="display:flex;justify-content:space-between;margin-bottom:3px;font-size:12px">
            <span style="font-weight:600">${c.nom}</span>
            <span style="font-family:var(--mono);font-weight:700;color:${couleur}">${c.taux}% <span style="color:var(--muted);font-weight:400">(${c.placed}/${c.n})</span></span>
          </div>
          <div class="pbar" style="height:7px"><div class="pbar-fill" style="width:${c.taux}%;background:${couleur}"></div></div>
        </div>`;
      }).join('')}
      <div style="font-size:10px;color:var(--muted);margin-top:10px;font-style:italic">
        💡 Les critères en vert (≥40%) méritent plus de poids. Ceux en rouge (<20%) sont peu prédictifs.
      </div>
    </div>`;
  }

  // En attente de résultats
  if(wait.length){
    h+=`<div class="stitle">${wait.length} résultat(s) à saisir</div>`;
    wait.slice(0,10).forEach(a=>{
      const top3=(a.top3||[]).map(p=>`<span class="chip" style="background:var(--sf);color:var(--dim);font-size:10px">#${p.numero} ${p.nom}</span>`).join(' ');
      h+=`<div class="rcard">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;gap:8px">
          <div>
            <div style="font-weight:600;font-size:13px">${a.course}</div>
            <div style="font-size:11px;color:var(--muted)">${a.date} · ${a.hippodrome||''} · ${a.heure||''}</div>
          </div>
          ${a.isQuinte?`<span class="chip" style="background:rgba(201,165,74,.15);color:var(--gold)">Q+</span>`:''}
        </div>
        <div style="font-size:11px;color:var(--muted);margin-bottom:5px">Notre sélection</div>
        <div style="display:flex;gap:4px;flex-wrap:wrap;margin-bottom:10px">${top3}</div>
        <div style="font-size:11px;color:var(--muted);margin-bottom:5px">Saisir l'arrivée réelle (ex: 7-2-9)</div>
        <div style="display:flex;gap:8px">
          <input class="inp" placeholder="7-2-9" id="arr-${a.id}" style="flex:1;font-size:13px"/>
          <button class="btn btn-gold btn-sm" onclick="valArr('${a.id}')">OK</button>
        </div>
      </div>`;
    });
  }

  // Historique complet
  if(done.length){
    h+=`<div class="stitle">Historique des résultats</div>`;
    done.slice(0,20).forEach(a=>{
      const arr=(a.arrivee||'').split('-').map(n=>parseInt(n)).filter(n=>!isNaN(n));
      const top=(a.top3||[]).map(p=>p.numero);
      const sg=top[0]===arr[0], sp=arr.slice(0,3).includes(top[0]);
      const cp=top.length>=2&&arr.slice(0,3).includes(top[0])&&arr.slice(0,3).includes(top[1]);
      const s4=top.filter(n=>arr.slice(0,4).includes(n)).length>=2;
      const badges=[];
      if(sg) badges.push({l:'SG✅',c:'var(--green)',b:'var(--greenb)'});
      else   badges.push({l:'SG❌',c:'var(--muted)',b:'var(--sf)'});
      if(sp) badges.push({l:'SP✅',c:'var(--green)',b:'var(--greenb)'});
      if(cp) badges.push({l:'CP✅',c:'var(--gold)',b:'rgba(201,165,74,.12)'});
      if(s4) badges.push({l:'2S4✅',c:'var(--blue)',b:'var(--blueb)'});

      h+=`<div class="rcard">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px">
          <div>
            <div style="font-weight:600;font-size:13px">${a.course}</div>
            <div style="font-size:11px;color:var(--muted)">${a.date}</div>
          </div>
          <div style="font-family:var(--mono);color:var(--muted);font-size:11px">→ ${a.arrivee}</div>
        </div>
        <div style="display:flex;gap:4px;flex-wrap:wrap">
          ${badges.map(b=>`<span class="chip" style="background:${b.b};color:${b.c}">${b.l}</span>`).join('')}
        </div>
      </div>`;
    });
  }

  h+=`<button class="btn btn-ghost" style="margin-top:8px;margin-bottom:80px" onclick="if(confirm('Effacer tout?')){localStorage.removeItem('${DB}');renderBilan();toast('Effacé')}">Effacer l'historique</button>`;
  el.innerHTML=h;
}

function valArr(id) {
  const inp=document.getElementById('arr-'+id);
  if(!inp||!inp.value.trim()){toast('Entrez l\'arrivée');return;}
  const nums=inp.value.split(/[-\s,]+/).map(n=>parseInt(n)).filter(n=>!isNaN(n));
  if(!nums.length){toast('Format: 7-2-9');return;}
  dbUpd(id,{arrivee:nums.join('-'),statut:'complete'});
  toast('✅ Résultat enregistré !');
  renderBilan();
}

// ══════════════════════════════════════════════════════
//  HELPERS
// ══════════════════════════════════════════════════════
function setLog(id,msg,type='dim'){
  const el=document.getElementById(id+'-log');
  if(!el) return;
  el.style.color=type==='green'?'var(--green)':type==='red'?'var(--red)':'var(--dim)';
  el.innerHTML=type==='dim'?`<span class="spin" style="font-size:10px;margin-right:6px">◌</span>${msg}`:msg;
}
function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('on');
  setTimeout(()=>t.classList.remove('on'),2500);
}

// ── INIT ─────────────────────────────────────────────
const now=new Date();
document.getElementById('hdr-date').textContent=now.getDate()+' '+MONTHS_S[now.getMonth()];
document.getElementById('hdr-day').textContent=DAYS[now.getDay()];
renderCal();
</script>
